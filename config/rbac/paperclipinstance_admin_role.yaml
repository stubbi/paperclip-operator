# This rule is not used by the project paperclip-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over paperclip.paperclip.ai.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: paperclip-operator
    app.kubernetes.io/managed-by: kustomize
  name: paperclipinstance-admin-role
rules:
- apiGroups:
  - paperclip.paperclip.ai
  resources:
  - paperclipinstances
  verbs:
  - '*'
- apiGroups:
  - paperclip.paperclip.ai
  resources:
  - paperclipinstances/status
  verbs:
  - get
