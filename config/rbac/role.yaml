  resources:
  - paperclipinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - paperclip.paperclip.ai
  resources:
  - paperclipinstances/finalizers
  verbs:
  - update
- apiGroups:
  - paperclip.paperclip.ai
  resources:
  - paperclipinstances/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
