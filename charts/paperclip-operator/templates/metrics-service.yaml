{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperclip-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "paperclip-operator.selectorLabels" . | nindent 4 }}
    control-plane: controller-manager
  ports:
    - name: https
      port: 8443
      targetPort: metrics
      protocol: TCP
{{- end }}
